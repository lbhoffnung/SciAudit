name: SciAudit CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          # Install optional dependencies for notebook support if needed
          # pip install nbformat nbconvert
          
      - name: Run SciAudit
        run: |
          # Use JSON format for better CI logging if needed
          # or just standard text for human readable logs in actions
          sciaudit . --exit-code-strategy any-error
          
      - name: Upload Report (if generated)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sciaudit-report
          path: SCIAUDIT_REPORT.md
